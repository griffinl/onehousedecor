name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token $VERCEL_TOKEN --scope griffinls-projects --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
